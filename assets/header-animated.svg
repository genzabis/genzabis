<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 250" width="100%" height="250">
  <defs>
    <!-- Retro Sunset Gradient -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2b0057"/>
      <stop offset="50%" stop-color="#bd0055"/>
      <stop offset="100%" stop-color="#ff6600"/>
    </linearGradient>
    
    <!-- Ground Gradient -->
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a381f"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <!-- Glowing Sun Gradient -->
    <linearGradient id="sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff0055"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Ensure emojis render perfectly across OS */
    .emoji { 
      font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif; 
    }
    
    /* Background Scrolling */
    @keyframes scrollBg {
      from { transform: translateX(0); }
      to { transform: translateX(-1000px); }
    }
    @keyframes scrollFg {
      from { transform: translateX(0); }
      to { transform: translateX(-1000px); }
    }

    /* Horizontal Movement */
    @keyframes moveRight {
      from { transform: translateX(-200px); }
      to { transform: translateX(1200px); }
    }
    @keyframes moveRightSlow {
      from { transform: translateX(-200px); }
      to { transform: translateX(1200px); }
    }
    @keyframes moveRightFast {
      from { transform: translateX(-200px); }
      to { transform: translateX(1200px); }
    }
    @keyframes moveLeft {
      from { transform: translateX(1200px); }
      to { transform: translateX(-200px); }
    }
    @keyframes moveLeftSlow {
      from { transform: translateX(1200px); }
      to { transform: translateX(-200px); }
    }

    /* Vertical and Rotation Bouncing (The Animals' life!) */
    @keyframes bounceDog {
      from { transform: translateY(180px) rotate(-10deg); }
      to { transform: translateY(110px) rotate(15deg); }
    }
    @keyframes wobbleCroc {
      0% { transform: translateY(195px) rotate(0deg); }
      25% { transform: translateY(192px) rotate(3deg); }
      50% { transform: translateY(195px) rotate(0deg); }
      75% { transform: translateY(192px) rotate(-3deg); }
      100% { transform: translateY(195px) rotate(0deg); }
    }
    @keyframes flyBird {
      from { transform: translateY(30px) rotate(-10deg); }
      to { transform: translateY(80px) rotate(10deg); }
    }
    @keyframes bounceFrog {
      from { transform: translateY(195px) scaleY(0.8); }
      to { transform: translateY(120px) scaleY(1.1); }
    }
    @keyframes runTiger {
      from { transform: translateY(175px) rotate(-5deg); }
      to { transform: translateY(165px) rotate(5deg); }
    }
    @keyframes walkRex {
      0% { transform: translateY(165px) rotate(-3deg); }
      100% { transform: translateY(155px) rotate(3deg); }
    }
    @keyframes swingMonkey {
      from { transform: rotate(-30deg); }
      to { transform: rotate(30deg); }
    }
  </style>

  <!-- Sky Background -->
  <rect width="100%" height="100%" fill="url(#sky)" rx="16" />

  <!-- Outrun Retro Sun -->
  <circle cx="500" cy="110" r="70" fill="url(#sun)" filter="url(#glow)" />
  <rect x="400" y="130" width="200" height="3" fill="#ff6600" />
  <rect x="400" y="140" width="200" height="5" fill="#ff6600" />
  <rect x="400" y="152" width="200" height="8" fill="#ff6600" />
  <rect x="400" y="167" width="200" height="12" fill="#ff6600" />

  <!-- Background Trees (Slow Parallax) -->
  <g style="animation: scrollBg 25s linear infinite; opacity: 0.85;">
    <text x="80" y="170" class="emoji" font-size="60">🌲</text>
    <text x="380" y="165" class="emoji" font-size="50">🌳</text>
    <text x="680" y="170" class="emoji" font-size="65">🌲</text>
    <text x="880" y="160" class="emoji" font-size="55">🌳</text>
    <!-- Seamless Loop Duplicate -->
    <text x="1080" y="170" class="emoji" font-size="60">🌲</text>
    <text x="1380" y="165" class="emoji" font-size="50">🌳</text>
    <text x="1680" y="170" class="emoji" font-size="65">🌲</text>
    <text x="1880" y="160" class="emoji" font-size="55">🌳</text>
  </g>

  <!-- Ground -->
  <rect x="0" y="180" width="1000" height="70" fill="url(#ground)" rx="0" />

  <!-- Ground Flora (Fast Parallax) -->
  <g style="animation: scrollFg 12s linear infinite;">
    <text x="20" y="210" class="emoji" font-size="40">🌿</text>
    <text x="220" y="225" class="emoji" font-size="25">🍄</text>
    <text x="420" y="200" class="emoji" font-size="60">🌴</text>
    <text x="750" y="230" class="emoji" font-size="35">🌺</text>
    <text x="920" y="215" class="emoji" font-size="45">🌱</text>
    <!-- Seamless Loop Duplicate -->
    <text x="1020" y="210" class="emoji" font-size="40">🌿</text>
    <text x="1220" y="225" class="emoji" font-size="25">🍄</text>
    <text x="1420" y="200" class="emoji" font-size="60">🌴</text>
    <text x="1750" y="230" class="emoji" font-size="35">🌺</text>
    <text x="1920" y="215" class="emoji" font-size="45">🌱</text>
  </g>


  <!-- ========================================== -->
  <!-- 🦒 THE ZOO ANIMALS 🐒                        -->
  <!-- ========================================== -->

  <!-- Swinging Monkey (Center, Static X position) -->
  <g style="transform-origin: 250px -50px; animation: swingMonkey 2.5s ease-in-out infinite alternate;">
    <line x1="250" y1="-50" x2="250" y2="80" stroke="#8B4513" stroke-width="3" />
    <text x="215" y="125" class="emoji" font-size="60">🐒</text>
  </g>

  <!-- Crocodile (Sneaking Right) - Flipped to face right -->
  <g style="animation: moveRightSlow 22s linear infinite;">
    <g style="animation: wobbleCroc 0.8s ease-in-out infinite alternate;">
      <g transform="scale(-1, 1)">
        <text x="-50" y="0" class="emoji" font-size="70">🐊</text>
      </g>
    </g>
  </g>

  <!-- T-Rex (Walking Left) -->
  <g style="animation: moveLeftSlow 30s linear infinite; animation-delay: -5s;">
    <g style="animation: walkRex 0.6s steps(2, start) infinite alternate;">
      <text x="0" y="0" class="emoji" font-size="100">🦖</text>
    </g>
  </g>

  <!-- Dog (Jumping happily Right) - Flipped to face right -->
  <g style="animation: moveRight 8s linear infinite; animation-delay: 2s;">
    <g style="animation: bounceDog 0.35s cubic-bezier(0.2, 0.8, 0.4, 1) infinite alternate;">
      <g transform="scale(-1, 1)">
        <text x="-30" y="0" class="emoji" font-size="64">🐕</text>
      </g>
    </g>
  </g>

  <!-- Tiger (Running Right Fast) - Flipped to face right -->
  <g style="animation: moveRightFast 5s linear infinite; animation-delay: 6s;">
    <g style="animation: runTiger 0.2s steps(2, start) infinite alternate;">
      <g transform="scale(-1, 1)">
        <text x="-40" y="0" class="emoji" font-size="80">🐅</text>
      </g>
    </g>
  </g>

  <!-- Frog (Bouncing Right) - Flipped to face right -->
  <g style="animation: moveRight 14s linear infinite; animation-delay: 4s;">
    <g style="animation: bounceFrog 0.4s cubic-bezier(0.2, 0.8, 0.4, 1) infinite alternate;">
      <g transform="scale(-1, 1)">
        <text x="-20" y="0" class="emoji" font-size="45">🐸</text>
      </g>
    </g>
  </g>

  <!-- Eagle (Flying Left) -->
  <g style="animation: moveLeft 10s linear infinite; animation-delay: 1s;">
    <g style="animation: flyBird 0.8s ease-in-out infinite alternate;">
      <text x="0" y="0" class="emoji" font-size="60">🦅</text>
    </g>
  </g>
  
  <!-- Parrot (Flying Left faster) -->
  <g style="animation: moveLeft 6s linear infinite; animation-delay: 4s;">
    <g style="animation: flyBird 0.5s ease-in-out infinite alternate;">
      <text x="0" y="0" class="emoji" font-size="45">🦜</text>
    </g>
  </g>

  <!-- ========================================== -->


  <!-- Front Grass Overlay (Creates depth) -->
  <g style="animation: scrollFg 9s linear infinite;">
    <text x="150" y="245" class="emoji" font-size="60">🌾</text>
    <text x="550" y="250" class="emoji" font-size="50">🌿</text>
    <text x="850" y="240" class="emoji" font-size="70">🌾</text>
    <!-- Seamless Loop Duplicate -->
    <text x="1150" y="245" class="emoji" font-size="60">🌾</text>
    <text x="1550" y="250" class="emoji" font-size="50">🌿</text>
    <text x="1850" y="240" class="emoji" font-size="70">🌾</text>
  </g>

</svg>

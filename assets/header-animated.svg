<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 250" width="100%" height="250">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="50%" stop-color="#161b22" />
      <stop offset="100%" stop-color="#0d1117" />
    </linearGradient>

    <!-- Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" />
      <stop offset="50%" stop-color="#79c0ff" />
      <stop offset="100%" stop-color="#58a6ff">
        <animate attributeName="offset" values="0;1;0" dur="5s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    
    <!-- Pattern for tech grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2937" stroke-width="0.5" stroke-dasharray="2 2" />
    </pattern>

    <!-- Glowing filter for text -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Base styling */
    text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
    }

    /* Background Animation */
    .bg-rect {
      animation: pulseBg 8s infinite alternate;
    }

    /* Grid Animation */
    .grid-bg {
      animation: panGrid 20s linear infinite;
    }

    /* Text Reveal Animations */
    .title {
      font-size: 52px;
      font-weight: 800;
      fill: url(#textGrad);
      filter: url(#glow);
      opacity: 0;
      animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    }

    .subtitle {
      font-size: 18px;
      font-weight: 500;
      fill: #8b949e;
      opacity: 0;
      letter-spacing: 2px;
      animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
    }

    .tags {
      font-size: 14px;
      font-weight: 600;
      fill: #c9d1d9;
      opacity: 0;
      animation: fadeIn 1s ease-out 1.2s forwards;
    }

    /* Floating Particles */
    .particle {
      fill: #58a6ff;
      opacity: 0;
    }

    .p1 { animation: float 6s ease-in-out infinite; animation-delay: 0s; }
    .p2 { animation: float 8s ease-in-out infinite; animation-delay: 2s; }
    .p3 { animation: float 7s ease-in-out infinite; animation-delay: 4s; }
    .p4 { animation: float 9s ease-in-out infinite; animation-delay: 1s; }
    .p5 { animation: float 5s ease-in-out infinite; animation-delay: 3s; }

    /* Animated Path (Drawing effect) */
    .line-path {
      fill: none;
      stroke: #58a6ff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      opacity: 0.5;
      animation: drawLine 3s ease-out 1.5s forwards, pulseLine 4s ease-in-out 4.5s infinite alternate;
    }

    /* Keyframes */
    @keyframes pulseBg {
      0% { opacity: 0.9; }
      100% { opacity: 1; }
    }

    @keyframes panGrid {
      from { transform: translate(0, 0); }
      to { transform: translate(-40px, -40px); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes float {
      0% { opacity: 0; transform: translate(0, 0) scale(0.8); }
      20% { opacity: 0.6; transform: translate(10px, -20px) scale(1.2); }
      80% { opacity: 0.6; transform: translate(-10px, -80px) scale(1); }
      100% { opacity: 0; transform: translate(0, -100px) scale(0.5); }
    }

    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }

    @keyframes pulseLine {
      from { opacity: 0.3; }
      to { opacity: 0.7; }
    }
    
    /* Glitch effect on title hover equivalent */
    @keyframes glitch-anim {
      0% { clip-path: inset(80% 0 0 0); transform: translate(-2px, 2px); }
      20% { clip-path: inset(10% 0 60% 0); transform: translate(2px, -2px); }
      40% { clip-path: inset(40% 0 20% 0); transform: translate(-2px, -2px); }
      60% { clip-path: inset(60% 0 10% 0); transform: translate(2px, 2px); }
      80% { clip-path: inset(20% 0 80% 0); transform: translate(-2px, 0); }
      100% { clip-path: inset(0 0 0 0); transform: translate(0, 0); }
    }
  </style>

  <!-- Background -->
  <rect class="bg-rect" width="100%" height="100%" fill="url(#bg)" rx="15" ry="15" />
  
  <!-- Grid overlay -->
  <rect class="grid-bg" width="120%" height="120%" fill="url(#grid)" />

  <!-- Animated connection line -->
  <path class="line-path" d="M 100 200 C 300 150 700 250 900 50" />
  <path class="line-path" d="M 50 50 C 250 100 650 0 950 150" style="animation-delay: 2s;" />

  <!-- Particles -->
  <circle class="particle p1" cx="150" cy="180" r="3" />
  <circle class="particle p2" cx="850" cy="200" r="4" />
  <circle class="particle p3" cx="750" cy="80" r="2" />
  <circle class="particle p4" cx="250" cy="60" r="5" />
  <circle class="particle p5" cx="500" cy="220" r="3" />

  <!-- Main Content Group -->
  <g text-anchor="middle">
    <!-- Main Title -->
    <text x="500" y="110" class="title">Niamilah Nabil Syahputra</text>
    
    <!-- Subtitle -->
    <text x="500" y="150" class="subtitle">Software Engineer • UI/UX Designer • Data Science &amp; AR</text>
    
    <!-- Tags/Pills -->
    <g class="tags">
      <!-- Tag 1 -->
      <rect x="230" y="180" width="120" height="26" rx="13" fill="#1f2937" stroke="#30363d" />
      <text x="290" y="198">Web Architecture</text>

      <!-- Tag 2 -->
      <rect x="360" y="180" width="100" height="26" rx="13" fill="#1f2937" stroke="#30363d" />
      <text x="410" y="198">Mobile Apps</text>

      <!-- Tag 3 -->
      <rect x="470" y="180" width="140" height="26" rx="13" fill="#1f2937" stroke="#30363d" />
      <text x="540" y="198">Spatial Computing</text>

      <!-- Tag 4 -->
      <rect x="620" y="180" width="150" height="26" rx="13" fill="#1f2937" stroke="#30363d" />
      <text x="695" y="198">Machine Learning</text>
    </g>
  </g>

</svg>
